  <text x="213" y="283" text-anchor="middle" fill="#fde68a" font-size="8">TeamsRetroSkeleton</text>

  <rect x="296" y="254" width="90" height="36" rx="5" fill="#f59e0b15" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
