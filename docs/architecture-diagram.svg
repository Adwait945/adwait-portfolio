  <text x="329" y="182" text-anchor="middle" fill="#a5b4fc" font-size="9">SkipLink</text>
  <text x="329" y="194" text-anchor="middle" fill="#c7d2fe" font-size="8">a11y</text>

  <rect x="366" y="168" width="58" height="32" rx="5" fill="#6366f115" stroke="#6366f1" stroke-width="1"/>
  <text x="395" y="182" text-anchor="middle" fill="#a5b4fc" font-size="9">Nav</text>
  <text x="395" y="194" text-anchor="middle" fill="#c7d2fe" font-size="8">'use client'</text>

  <rect x="432" y="168" width="58" height="32" rx="5" fill="#6366f115" stroke="#6366f1" stroke-width="1"/>
  <text x="461" y="182" text-anchor="middle" fill="#a5b4fc" font-size="9">Footer</text>
  <text x="461" y="194" text-anchor="middle" fill="#c7d2fe" font-size="8">server</text>

  <line x1="329" y1="152" x2="329" y2="168" stroke="#6366f1" stroke-width="1"/>
  <line x1="400" y1="152" x2="395" y2="168" stroke="#6366f1" stroke-width="1"/>
  <line x1="461" y1="152" x2="461" y2="168" stroke="#6366f1" stroke-width="1"/>

