  <text x="68"  y="378" text-anchor="middle" fill="#6ee7b7" font-size="9">6 · Experience</text>

  <rect x="124" y="360" width="96" height="28" rx="4" fill="#10b98115" stroke="#10b981" stroke-width="1"/>
  <text x="172" y="378" text-anchor="middle" fill="#6ee7b7" font-size="9">7 · Education</text>

  <rect x="228" y="360" width="96" height="28" rx="4" fill="#10b98115" stroke="#10b981" stroke-width="1"/>
  <text x="276" y="378" text-anchor="middle" fill="#6ee7b7" font-size="9">8 · About</text>

  <rect x="332" y="360" width="96" height="28" rx="4" fill="#10b98115" stroke="#10b981" stroke-width="1"/>
  <text x="380" y="378" text-anchor="middle" fill="#6ee7b7" font-size="9">9 · BeyondWork</text>

  <rect x="436" y="360" width="96" height="28" rx="4" fill="#10b98115" stroke="#10b981" stroke-width="1"/>
  <text x="484" y="378" text-anchor="middle" fill="#6ee7b7" font-size="9">10 · ContactCTA</text>

