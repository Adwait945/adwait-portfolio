  <text x="120" y="78" text-anchor="middle" fill="#7dd3fc" font-size="9">Locked copy v3 — single source of truth</text>

  <line x1="120" y1="88" x2="120" y2="108" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arr-blue)"/>

