  <text x="341" y="283" text-anchor="middle" fill="#fde68a" font-size="8">stub — Sprint 3</text>

  <rect x="396" y="254" width="80" height="36" rx="5" fill="#f59e0b15" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
