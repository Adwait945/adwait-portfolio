<svg viewBox="0 0 780 620" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <title>adwait-portfolio Sprint 1 Architecture</title>
  <desc>Diagram showing data flow from PORTFOLIO_CONTENT.md through site-config.ts into Next.js layout, page, and all 10 home section components, plus the 5 route structure.</desc>

  <!-- Background -->
  <rect width="780" height="620" fill="#0a0f1e" rx="12"/>

