  <text x="35" y="23" fill="#8899bb" font-size="10">Content/Config</text>
  <rect x="130" y="14" width="10" height="10" rx="2" fill="#6366f1"/>
  <text x="145" y="23" fill="#8899bb" font-size="10">Layout Shell</text>
  <rect x="240" y="14" width="10" height="10" rx="2" fill="#10b981"/>
  <text x="255" y="23" fill="#8899bb" font-size="10">Home Sections</text>
