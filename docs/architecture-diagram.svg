  <rect x="486" y="254" width="80" height="36" rx="5" fill="#f59e0b15" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="526" y="270" text-anchor="middle" fill="#fcd34d" font-size="10">/writing</text>
