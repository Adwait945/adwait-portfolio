  <text x="50" y="514" fill="#8899bb" font-size="9" font-weight="bold">BUILD PIPELINE</text>
  <text x="170" y="514" fill="#6ee7b7" font-size="9">tsc ✓</text>
  <text x="220" y="514" fill="#6ee7b7" font-size="9">lint ✓</text>
  <text x="270" y="514" fill="#6ee7b7" font-size="9">build ✓</text>
  <text x="340" y="514" fill="#6ee7b7" font-size="9">First Load JS: 96.8 kB / 250 kB</text>
