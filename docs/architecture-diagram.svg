  <text x="376" y="454" text-anchor="middle" fill="#a5b4fc" font-size="9">A11y — 3 suites</text>

  <rect x="448" y="438" width="120" height="24" rx="4" fill="#6366f120" stroke="#6366f1" stroke-width="1"/>
  <text x="508" y="454" text-anchor="middle" fill="#a5b4fc" font-size="9">Contract — 1 suite</text>

  <rect x="580" y="438" width="168" height="24" rx="4" fill="#f59e0b20" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="664" y="454" text-anchor="middle" fill="#fcd34d" font-size="9">E2E Playwright — 8 specs*</text>

