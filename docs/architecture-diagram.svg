  <rect x="332" y="324" width="96" height="28" rx="4" fill="#10b98115" stroke="#10b981" stroke-width="1"/>
  <text x="380" y="342" text-anchor="middle" fill="#6ee7b7" font-size="9">4 · CareerTraj.</text>

