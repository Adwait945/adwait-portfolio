  <text x="120" y="126" text-anchor="middle" fill="#0ea5e9" font-size="11" font-weight="bold">lib/site-config.ts</text>
  <text x="120" y="142" text-anchor="middle" fill="#7dd3fc" font-size="9">Typed content + nav + footer + sections</text>

