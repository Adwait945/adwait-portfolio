  <text x="20" y="556" fill="#8899bb" font-size="8">* E2E tests require a running dev server — run: npm run dev, then: npm run test:e2e</text>
  <text x="20" y="568" fill="#8899bb" font-size="8">Manual prereqs before deploy: public/resumes/*.pdf · public/opengraph.jpg · NEXT_PUBLIC_SITE_URL in .env.local</text>

